<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Network Threat Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --card:    #1c2128;
      --border:  #30363d;
      --text:    #c9d1d9;
      --muted:   #8b949e;
      --accent:  #58a6ff;
      --danger:  #f85149;
      --warn:    #e3b341;
      --ok:      #3fb950;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.7rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    h1 { font-size: 0.95rem; color: var(--accent); letter-spacing: 0.06em; }
    #last-update { font-size: 0.75rem; color: var(--muted); font-family: monospace; }

    main {
      padding: 1.25rem;
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .load-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem 1.25rem;
    }
    .load-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .load-field {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      flex: 1;
      min-width: 180px;
    }
    .load-field label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    input[type=text] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 0.32rem 0.6rem;
      font-size: 0.82rem;
      font-family: monospace;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type=text]:focus { border-color: var(--accent); }
    button {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #0d1117;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 0.32rem 0.9rem;
      align-self: flex-end;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.82; }
    #load-status {
      font-size: 0.78rem;
      font-family: monospace;
      align-self: center;
      min-width: 160px;
    }
    #load-status.ok  { color: var(--ok); }
    #load-status.err { color: var(--danger); }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem 1.1rem;
      transition: border-color 0.2s;
    }
    .card.alert { border-color: var(--danger); }
    .card-val {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .card.alert .card-val { color: var(--danger); }
    .card-lbl {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .chart-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem 1.1rem;
    }
    .chart-box.span2 { grid-column: 1 / -1; }
    .chart-title {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }
    .chart-wrap { position: relative; height: 210px; }

    .threats {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem 1.1rem;
    }
    .section-title {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }
    .threat-card {
      background: var(--surface);
      border-left: 3px solid var(--border);
      border-radius: 0 6px 6px 0;
      padding: 0.6rem 1rem;
      margin-bottom: 0.45rem;
    }
    .threat-card.sev-critical { border-left-color: var(--danger); }
    .threat-card.sev-high     { border-left-color: var(--warn); }
    .th-row { display: flex; align-items: center; gap: 0.55rem; margin-bottom: 0.3rem; }
    .badge {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 0.08rem 0.42rem;
      border-radius: 4px;
      background: var(--border);
      color: var(--text);
    }
    .badge.critical { background: var(--danger); color: #fff; }
    .badge.high     { background: var(--warn);   color: #000; }
    .th-name { font-weight: 600; font-size: 0.88rem; text-transform: capitalize; }
    .th-detail { font-size: 0.76rem; color: var(--muted); margin-top: 0.12rem; }
    .th-detail b { color: var(--muted); font-weight: 600; margin-right: 0.25rem; }
    .th-detail code {
      color: var(--text);
      background: var(--bg);
      padding: 0.04rem 0.28rem;
      border-radius: 3px;
      font-size: 0.76rem;
      word-break: break-all;
    }
    .no-threats { color: var(--ok); font-size: 0.88rem; }

    @media (max-width: 900px) {
      .cards  { grid-template-columns: 1fr 1fr; }
      .charts { grid-template-columns: 1fr; }
      .chart-box.span2 { grid-column: 1; }
    }
  </style>
</head>
<body>

<header>
  <h1>NETWORK THREAT MONITOR</h1>
  <span id="last-update">—</span>
</header>

<main>
  <section class="load-panel">
    <div class="load-row">
      <div class="load-field">
        <label>Connections Log</label>
        <input id="input-conn" type="text" placeholder="sample_connections.log">
        <button onclick="loadFile('connections')">Load</button>
      </div>
      <div class="load-field">
        <label>Auth Log</label>
        <input id="input-auth" type="text" placeholder="sample_auth.log">
        <button onclick="loadFile('auth')">Load</button>
      </div>
      <div class="load-field">
        <label>PCAP File</label>
        <input id="input-pcap" type="text" placeholder="capture.pcap">
        <button onclick="loadFile('pcap')">Load</button>
      </div>
      <span id="load-status"></span>
    </div>
  </section>

  <section class="cards">
    <div class="card">
      <div class="card-val" id="stat-conns">—</div>
      <div class="card-lbl">Connections</div>
    </div>
    <div class="card">
      <div class="card-val" id="stat-auth">—</div>
      <div class="card-lbl">Auth Events</div>
    </div>
    <div class="card" id="card-threats">
      <div class="card-val" id="stat-threats">—</div>
      <div class="card-lbl">Threats Detected</div>
    </div>
    <div class="card">
      <div class="card-val" id="stat-bl">—</div>
      <div class="card-lbl">Blacklisted IPs</div>
    </div>
  </section>

  <section class="charts">
    <div class="chart-box span2">
      <div class="chart-title">Connection Timeline</div>
      <div class="chart-wrap"><canvas id="chart-timeline"></canvas></div>
    </div>
    <div class="chart-box">
      <div class="chart-title">Protocol Distribution</div>
      <div class="chart-wrap"><canvas id="chart-proto"></canvas></div>
    </div>
    <div class="chart-box">
      <div class="chart-title">Top Source IPs</div>
      <div class="chart-wrap"><canvas id="chart-sources"></canvas></div>
    </div>
    <div class="chart-box span2">
      <div class="chart-title">Auth Events Timeline</div>
      <div class="chart-wrap"><canvas id="chart-auth"></canvas></div>
    </div>
  </section>

  <section class="threats">
    <div class="section-title">Active Threats</div>
    <div id="threat-list"><p class="no-threats">Loading…</p></div>
  </section>

</main>

<script>
let chartTimeline, chartProto, chartSources, chartAuth;

const C = {
  accent:  '#58a6ff',
  danger:  '#f85149',
  warn:    '#e3b341',
  ok:      '#3fb950',
  purple:  '#bc8cff',
  orange:  '#ffa657',
  grid:    '#21262d',
  text:    '#8b949e',
};

Chart.defaults.color = '#c9d1d9';
Chart.defaults.borderColor = C.grid;

function initCharts() {
  const scalesXY = {
    x: { ticks: { color: C.text, maxTicksLimit: 10 }, grid: { color: C.grid } },
    y: { ticks: { color: C.text },                    grid: { color: C.grid } }
  };

  chartTimeline = new Chart(document.getElementById('chart-timeline'), {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: 'Connections',
        data: [],
        borderColor: C.accent,
        backgroundColor: C.accent + '22',
        tension: 0.35,
        fill: true,
        pointRadius: 3,
        pointHoverRadius: 5,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: scalesXY
    }
  });

  chartProto = new Chart(document.getElementById('chart-proto'), {
    type: 'doughnut',
    data: {
      labels: [],
      datasets: [{
        data: [],
        backgroundColor: [C.accent, C.ok, C.warn, C.danger, C.purple, C.orange],
        borderWidth: 2,
        borderColor: '#1c2128'
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'right', labels: { color: '#c9d1d9', boxWidth: 12 } } }
    }
  });

  chartSources = new Chart(document.getElementById('chart-sources'), {
    type: 'bar',
    data: {
      labels: [],
      datasets: [{
        label: 'Connections',
        data: [],
        backgroundColor: C.accent + 'bb',
        borderColor: C.accent,
        borderWidth: 1
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: C.text }, grid: { color: C.grid } },
        y: { ticks: { color: C.text, font: { family: 'monospace', size: 11 } }, grid: { color: C.grid } }
      }
    }
  });

  chartAuth = new Chart(document.getElementById('chart-auth'), {
    type: 'bar',
    data: {
      labels: [],
      datasets: [
        { label: 'Failed',  data: [], backgroundColor: C.danger + 'cc', borderColor: C.danger, borderWidth: 1 },
        { label: 'Success', data: [], backgroundColor: C.ok    + 'cc', borderColor: C.ok,     borderWidth: 1 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#c9d1d9', boxWidth: 12 } } },
      scales: {
        x: { stacked: true, ticks: { color: C.text }, grid: { color: C.grid } },
        y: { stacked: true, ticks: { color: C.text }, grid: { color: C.grid } }
      }
    }
  });
}

function setChart(chart, labels, ...dataSets) {
  chart.data.labels = labels;
  dataSets.forEach((data, i) => { chart.data.datasets[i].data = data; });
  chart.update('none');   // 'none' skips animation on auto-refresh
}

function updateSummary(s) {
  document.getElementById('stat-conns').textContent   = s.connections;
  document.getElementById('stat-auth').textContent    = s.auth_events;
  document.getElementById('stat-threats').textContent = s.threat_count;
  document.getElementById('stat-bl').textContent      = s.blacklisted_ips;
  document.getElementById('card-threats')
    .classList.toggle('alert', s.threat_count > 0);
}

function renderThreats(threats) {
  const el = document.getElementById('threat-list');
  if (!threats || threats.length === 0) {
    el.innerHTML = '<p class="no-threats">No threats detected.</p>';
    return;
  }
  el.innerHTML = threats.map(t => {
    const sev = t.severity.toLowerCase();
    return `
      <div class="threat-card sev-${sev}">
        <div class="th-row">
          <span class="badge ${sev}">${t.severity}</span>
          <span class="th-name">${t.type.replace(/_/g, ' ')}</span>
        </div>
        <div class="th-detail"><b>Target</b><code>${esc(t.target)}</code></div>
        <div class="th-detail"><b>Evidence</b><code>${esc(t.evidence)}</code></div>
      </div>`;
  }).join('');
}

async function loadFile(type) {
  const ids = { connections: 'input-conn', auth: 'input-auth', pcap: 'input-pcap' };
  const file = document.getElementById(ids[type]).value.trim();
  if (!file) return;

  const statusEl = document.getElementById('load-status');
  statusEl.className = '';
  statusEl.textContent = `Loading ${type}…`;

  try {
    const r = await fetch(`/api/load/${type}`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ file })
    });
    const j = await r.json();
    if (j.status === 'ok') {
      statusEl.className   = 'ok';
      statusEl.textContent = `✓ ${j.loaded} records loaded`;
      refresh();
    } else {
      statusEl.className   = 'err';
      statusEl.textContent = `✗ ${j.message}`;
    }
  } catch (e) {
    statusEl.className   = 'err';
    statusEl.textContent = `✗ ${e.message}`;
  }
}

async function refresh() {
  try {
    const [summary, threats, data] = await Promise.all([
      fetch('/api/summary').then(r => r.json()),
      fetch('/api/threats').then(r => r.json()),
      fetch('/api/data').then(r => r.json()),
    ]);

    updateSummary(summary);
    renderThreats(threats.threats);

    setChart(chartTimeline,
      data.connections_over_time.labels,
      data.connections_over_time.data);

    setChart(chartProto,
      data.protocol_distribution.labels,
      data.protocol_distribution.data);

    setChart(chartSources,
      data.top_sources.labels,
      data.top_sources.data);

    setChart(chartAuth,
      data.auth_timeline.labels,
      data.auth_timeline.failed,
      data.auth_timeline.success);

    document.getElementById('last-update').textContent =
      'Updated ' + new Date().toLocaleTimeString();

  } catch (e) {
    console.error('Refresh error:', e);
    document.getElementById('last-update').textContent = 'Connection error';
  }
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

document.addEventListener('DOMContentLoaded', () => {
  initCharts();
  refresh();
  setInterval(refresh, 10000);
});
</script>

</body>
</html>
